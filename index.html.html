<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Görevde Yükselme - 4. Grup Soru Bankası</title>
<!-- Tam ekran PWA için -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; min-height: 100vh; 
    overflow-x: hidden;
  }
  
  /* HEADER */
  .header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 16px 16px 12px; position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid #2a2a4a;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .header .subtitle { font-size: 12px; color: #8899aa; }
  
  /* TOPIC SELECTOR */
  .topic-bar {
    display: flex; gap: 6px; padding: 10px 12px; 
    background: #0d1b2a; overflow-x: auto; 
    -webkit-overflow-scrolling: touch;
    position: sticky; top: 70px; z-index: 99;
    border-bottom: 1px solid #1e2d3d;
  }
  .topic-btn {
    flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; border: none; cursor: pointer;
    background: #1a2a3a; color: #7a8a9a; transition: all 0.2s;
    white-space: nowrap;
  }
  .topic-btn.active { background: #4a9eff; color: #fff; }
  .topic-btn .count { font-size: 10px; opacity: 0.7; margin-left: 4px; }

  /* STATS BAR */
  .stats {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: #12122a;
    font-size: 13px; flex-wrap: wrap; gap: 4px;
  }
  .stats .progress-bar {
    flex: 1; min-width: 100px; height: 6px; background: #2a2a4a;
    border-radius: 3px; margin: 0 10px; overflow: hidden;
  }
  .stats .progress-fill {
    height: 100%; background: linear-gradient(90deg, #4a9eff, #00d4ff);
    transition: width 0.3s; border-radius: 3px;
  }

  /* QUESTION AREA */
  .question-area { padding: 16px; max-width: 700px; margin: 0 auto; }
  .q-badge {
    display: inline-block; padding: 3px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600; margin-bottom: 8px;
  }
  .q-badge.topic-badge { background: #1a3a5a; color: #6ab0ff; }
  .q-text {
    font-size: 16px; line-height: 1.6; font-weight: 500;
    margin-bottom: 16px; color: #f0f0f0;
  }
  .q-num { font-size: 12px; color: #6a7a8a; margin-bottom: 4px; }
  .q-ref { font-size: 11px; color: #5a6a7a; margin-bottom: 10px; font-style: italic; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .option {
    padding: 14px 16px; border-radius: 12px; background: #222240;
    border: 2px solid #2a2a50; cursor: pointer; font-size: 15px;
    transition: all 0.2s; display: flex; align-items: flex-start; gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active { transform: scale(0.98); }
  .option .letter {
    width: 28px; height: 28px; border-radius: 50%; background: #2a2a50;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .option.disabled { opacity: 0.6; pointer-events: none; }
  .option.correct { border-color: #00c853; background: #1a3a2a; }
  .option.correct .letter { background: #00c853; color: #fff; }
  .option.wrong { border-color: #ff1744; background: #3a1a1a; }
  .option.wrong .letter { background: #ff1744; color: #fff; }

  /* FEEDBACK */
  .feedback {
    padding: 14px 16px; border-radius: 12px; margin-bottom: 16px;
    font-size: 14px; line-height: 1.5; display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #1a3a2a; border: 1px solid #00c853; color: #a0e8a0; }
  .feedback.wrong { background: #3a1a1a; border: 1px solid #ff1744; color: #ffa0a0; }

  /* NAV BUTTONS */
  .nav-buttons { display: flex; gap: 10px; margin-top: 16px; }
  .nav-btn {
    flex: 1; padding: 14px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn.primary { background: #4a9eff; color: #fff; }
  .nav-btn.secondary { background: #2a2a50; color: #a0a0c0; }
  .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
  .nav-btn.retry { background: #2a3a2a; color: #80d080; }

  /* RESULTS */
  .results {
    display: none; padding: 20px; text-align: center; max-width: 500px; margin: 0 auto;
  }
  .results.show { display: block; }
  .results .score-circle {
    width: 150px; height: 150px; border-radius: 50%; margin: 20px auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 6px solid #4a9eff; 
  }
  .results .score-num { font-size: 48px; font-weight: 800; color: #fff; }
  .results .score-label { font-size: 14px; color: #8899aa; }
  .results .detail-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid #1e2d3d; font-size: 14px;
  }

  /* REVIEW MODE */
  .review-item {
    padding: 16px; margin-bottom: 12px; border-radius: 12px;
    background: #1a1a3a; border: 1px solid #2a2a5a;
  }
  .review-item .review-q { font-weight: 500; margin-bottom: 8px; }
  .review-item .review-a { font-size: 13px; }
  .review-item .review-a .correct { color: #00c853; }
  .review-item .review-a .wrong { color: #ff1744; }

  /* SETTINGS / MODE */
  .mode-toggle {
    display: flex; gap: 4px; background: #12122a; padding: 3px;
    border-radius: 10px; margin: 0 16px 10px;
  }
  .mode-btn {
    flex: 1; text-align: center; padding: 8px; border-radius: 8px;
    font-size: 12px; font-weight: 600; border: none; cursor: pointer;
    background: transparent; color: #667;
    transition: all 0.2s;
  }
  .mode-btn.active { background: #2a2a5a; color: #fff; }

  /* Shuffle button */
  .action-row {
    display: flex; gap: 8px; padding: 0 16px 10px;
  }
  .action-btn {
    padding: 8px 14px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    background: #1a2a3a; color: #8a9aaa; transition: all 0.2s;
  }
  .action-btn:active { background: #2a3a5a; }

  /* Empty state */
  .empty-state { padding: 40px 20px; text-align: center; color: #667; }

  @media (max-width: 400px) {
    .header h1 { font-size: 16px; }
    .q-text { font-size: 14px; }
    .option { font-size: 13px; padding: 12px 14px; }
  }
</style>
</head>

// ----- STATE -----
var state = {
  questions: [],
  current: 0,
  mode: 'all',
  answered: 0,
  correct: 0,
  wrong: 0,
  topicFilter: 'all',
  answerState: {}, // { 'qid': { selected: 'A', isCorrect: bool } }
  results: [] // for review
};

function init() {
  loadTopicFilter('all');
  buildTopicBar();
  setMode('all');
}

function buildTopicBar() {
  var bar = document.getElementById('topicBar');
  var html = '<button class="topic-btn '+(state.topicFilter=='all'?'active':'')+'" data-topic="all" onclick="loadTopicFilter(\'all\')">🏠 Tümü <span class="count">('+ALL_QUESTIONS.length+')</span></button>';
  TOPICS.forEach(function(t) {
    var count = ALL_QUESTIONS.filter(function(q) { return q.topic === t; }).length;
    if (count === 0) return;
    html += '<button class="topic-btn '+(state.topicFilter==t?'active':'')+'" data-topic="'+t+'" onclick="loadTopicFilter(\''+t+'\')">'+t+' <span class="count">('+count+')</span></button>';
  });
  bar.innerHTML = html;
}

function loadTopicFilter(topic) {
  state.topicFilter = topic;
  buildTopicBar();
  if (state.mode === 'review') { renderReview(); return; }
  if (state.mode === 'wrong') { showWrong(); return; }
  resetQuestionSet();
}

function resetQuestionSet() {
  state.current = 0;
  state.answered = 0;
  state.correct = 0;
  state.wrong = 0;
  state.answerState = {};
  filterQuestions();
  showQuestion();
}

function getFiltered() {
  return ALL_QUESTIONS.filter(function(q) {
    if (state.topicFilter !== 'all' && q.topic !== state.topicFilter) return false;
    return true;
  });
}

function filterQuestions() {
  state.questions = getFiltered();
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('questionArea').style.display = '';
  
  if (mode === 'review') { renderReview(); return; }
  if (mode === 'wrong') { showWrong(); return; }
  if (mode === 'all' || mode === 'test') {
    resetQuestionSet();
  }
}

function showQuestion() {
  var area = document.getElementById('questionArea');
  var resArea = document.getElementById('resultsArea');
  resArea.classList.remove('show');
  
  var qs = state.questions;
  var idx = state.current;
  
  if (qs.length === 0) {
    area.innerHTML = '<div class="empty-state">❌ Bu kategoride soru bulunmuyor</div>';
    updateStats();
    return;
  }
  
  if (idx >= qs.length) {
    if (state.mode === 'test') {
      showResults();
    } else {
      state.current = 0;
      idx = 0;
    }
    return;
  }
  
  var q = qs[idx];
  var answered = state.answerState['q'+q.id];
  
  var html = '';
  html += '<div class="q-num">Soru ' + (idx+1) + '/' + qs.length + '</div>';
  html += '<div class="q-badge topic-badge">' + q.topic + '</div>';
  html += '<div class="q-text">' + q.question + '</div>';
  html += '<div class="q-ref">📖 ' + (q.article || '') + '</div>';
  html += '<div class="options">';
  
  var letters = ['A','B','C','D'];
  letters.forEach(function(l) {
    var optText = q.options[l];
    if (!optText) return;
    var cls = 'option';
    var letterCls = 'letter';
    if (answered) {
      cls += ' disabled';
      if (l === q.correct) { cls += ' correct'; letterCls += ' correct'; }
      else if (l === answered.selected && !answered.isCorrect) { cls += ' wrong'; letterCls += ' wrong'; }
    }
    html += '<div class="'+cls+'" onclick="selectOption(\''+l+'\')"><span class="'+letterCls+'">'+l+'</span><span>'+optText+'</span></div>';
  });
  html += '</div>';
  
  if (answered) {
    var fbClass = answered.isCorrect ? 'correct' : 'wrong';
    var fbMsg = answered.isCorrect ? '✅ Doğru!' : '❌ Yanlış. Doğru cevap: ' + q.correct + ') ' + (q.options[q.correct] || '');
    html += '<div class="feedback show '+fbClass+'">'+fbMsg+'</div>';
  }
  
  // Nav buttons
  html += '<div class="nav-buttons">';
  if (idx > 0) html += '<button class="nav-btn secondary" onclick="goQuestion(-1)">⬅ Önceki</button>';
  if (answered || state.mode === 'all') {
    if (idx < qs.length - 1) {
      html += '<button class="nav-btn primary" onclick="goQuestion(1)">Sonraki ➡</button>';
    } else {
      html += '<button class="nav-btn primary" onclick="goToResults()">🎯 Sonuçları Gör</button>';
    }
  } else {
    html += '<button class="nav-btn primary" onclick="skipQuestion()">Geç ⏭</button>';
  }
  html += '</div>';
  
  area.innerHTML = html;
  updateStats();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectOption(letter) {
  var q = state.questions[state.current];
  if (state.answerState['q'+q.id]) return; // already answered
  
  var isCorrect = (letter === q.correct);
  state.answerState['q'+q.id] = { selected: letter, isCorrect: isCorrect };
  state.answered++;
  if (isCorrect) state.correct++; else state.wrong++;
  
  // In test mode, auto-advance
  showQuestion();
}

function skipQuestion() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    showQuestion();
  }
}

function goQuestion(dir) {
  var newIdx = state.current + dir;
  if (newIdx >= 0 && newIdx < state.questions.length) {
    state.current = newIdx;
    showQuestion();
  }
}

function updateStats() {
  var qs = state.questions;
  var total = qs.length;
  var answered = state.answered;
  document.getElementById('statProgress').textContent = answered + '/' + total;
  document.getElementById('progressFill').style.width = (total > 0 ? (answered/total*100) : 0) + '%';
  var score = state.answered > 0 ? Math.round(state.correct/state.answered*100) : 0;
  document.getElementById('statScore').textContent = '%' + score;
}

function showResults() {
  document.getElementById('questionArea').style.display = 'none';
  var resArea = document.getElementById('resultsArea');
  resArea.classList.add('show');
  
  var total = state.questions.length;
  var score = state.answered > 0 ? Math.round(state.correct/state.answered*100) : 0;
  
  var html = '';
  html += '<h2>📊 Sınav Sonucu</h2>';
  html += '<div class="score-circle"><div class="score-num">%'+score+'</div><div class="score-label">Başarı</div></div>';
  html += '<div class="detail-row"><span>Toplam Soru</span><span>'+total+'</span></div>';
  html += '<div class="detail-row"><span>Cevaplanan</span><span>'+state.answered+'</span></div>';
  html += '<div class="detail-row"><span style="color:#00c853;">✅ Doğru</span><span style="color:#00c853;">'+state.correct+'</span></div>';
  html += '<div class="detail-row"><span style="color:#ff1744;">❌ Yanlış</span><span style="color:#ff1744;">'+state.wrong+'</span></div>';
  html += '<div class="detail-row"><span>Boş/Geçilen</span><span>'+(total-state.answered)+'</span></div>';
  html += '<br><div class="nav-buttons">';
  html += '<button class="nav-btn primary" onclick="setMode(\'review\')">📋 Gözden Geçir</button>';
  html += '<button class="nav-btn secondary" onclick="resetQuestionSet()">🔄 Tekrar Dene</button>';
  html += '</div>';
  
  resArea.innerHTML = html;
}

function goToResults() {
  showResults();
}

function renderReview() {
  document.getElementById('questionArea').style.display = '';
  document.getElementById('resultsArea').classList.remove('show');
  var area = document.getElementById('questionArea');
  
  var qs = getFiltered();
  var answered = qs.filter(function(q) { return state.answerState['q'+q.id]; });
  
  if (answered.length === 0) {
    area.innerHTML = '<div class="empty-state">Henüz cevaplanmış soru yok. Soruları cevapladıktan sonra buradan gözden geçirebilirsiniz.</div>';
    return;
  }
  
  var html = '';
  answered.forEach(function(q) {
    var ans = state.answerState['q'+q.id];
    if (!ans) return;
    var isCorrect = ans.isCorrect;
    html += '<div class="review-item">';
    html += '<div class="review-q">' + q.question + '</div>';
    html += '<div class="q-ref">📖 ' + (q.article || '') + ' · ' + q.topic + '</div>';
    html += '<div class="review-a">';
    html += 'Senin cevabın: <span class="'+(isCorrect?'correct':'wrong')+'">' + ans.selected + (isCorrect?' ✅':' ❌') + '</span><br>';
    if (!isCorrect) {
      html += 'Doğru cevap: <span class="correct">' + q.correct + ') ' + (q.options[q.correct] || '') + '</span>';
    }
    html += '</div></div>';
  });
  
  html += '<div class="nav-buttons"><button class="nav-btn secondary" onclick="setMode(\'all\')">⬅ Sorulara Dön</button></div>';
  area.innerHTML = html;
}

function showWrong() {
  document.getElementById('questionArea').style.display = '';
  document.getElementById('resultsArea').classList.remove('show');
  var area = document.getElementById('questionArea');
  
  var wrongIds = Object.keys(state.answerState).filter(function(k) {
    return !state.answerState[k].isCorrect;
  }).map(function(k) { return parseInt(k.replace('q','')); });
  
  var wrongQs = getFiltered().filter(function(q) { return wrongIds.indexOf(q.id) !== -1; });
  
  if (wrongQs.length === 0) {
    area.innerHTML = '<div class="empty-state">🎉 Hiç yanlışınız yok! Tebrikler!</div>';
    return;
  }
  
  state.questions = wrongQs;
  state.current = 0;
  state.answered = 0;
  state.correct = 0;
  state.wrong = 0;
  state.answerState = {};
  showQuestion();
}

function shuffleQuestions() {
  if (state.mode === 'review') return;
  var arr = state.questions;
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  state.current = 0;
  state.answered = 0;
  state.correct = 0;
  state.wrong = 0;
  state.answerState = {};
  showQuestion();
}

function confirmReset() {
  if (confirm('Tüm ilerlemeyi sıfırla? Cevaplanmış tüm sorular silinecek.')) {
    state.answered = 0;
    state.correct = 0;
    state.wrong = 0;
    state.answerState = {};
    state.current = 0;
    filterQuestions();
    showQuestion();
  }
}

// Load on page ready
document.addEventListener('DOMContentLoaded', init);
</script>
